name: Postman自动化测试
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装Node环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行Postman测试
        run: |
          npm install -g newman
          newman run collections/test_for_auto.postman_collection.json \
          -e environments/测试环境.postman_environment.json \
